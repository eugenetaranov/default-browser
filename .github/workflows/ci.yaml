name: CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift run RouterTests

      - name: Assemble app bundle (smoke)
        run: ./scripts/bundle.sh
