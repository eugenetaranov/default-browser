name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Wait for CI to succeed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for CI workflow to complete..."
          while true; do
            status=$(gh run list --repo ${{ github.repository }} --commit ${{ github.sha }} --workflow CI --json status,conclusion --jq '.[0] | "\(.status) \(.conclusion)"')
            echo "CI status: $status"
            if [[ "$status" == "completed success" ]]; then
              echo "CI passed!"
              exit 0
            elif [[ "$status" == "completed"* ]]; then
              echo "CI failed or was cancelled"
              exit 1
            fi
            sleep 10
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build universal .app (ad-hoc signed)
        run: ./scripts/bundle.sh --release --universal

      - name: Package zip + checksum
        id: pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent build/DefaultBrowserRouter.app DefaultBrowserRouter.zip
          SHA=$(shasum -a 256 DefaultBrowserRouter.zip | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Built $VERSION ($SHA)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DefaultBrowserRouter.zip
          generate_release_notes: true

      - name: Update Homebrew tap cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: ${{ github.repository_owner }}/homebrew-tap
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.pkg.outputs.version }}
          SHA256: ${{ steps.pkg.outputs.sha256 }}
        run: |
          if [[ -z "${TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap update."
            exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Casks
          cat > tap/Casks/default-browser-router.rb <<EOF
          cask "default-browser-router" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${REPO}/releases/download/v#{version}/DefaultBrowserRouter.zip"
            name "Default Browser Router"
            desc "Routes links to different browsers by YAML rules"
            homepage "https://github.com/${REPO}"

            depends_on macos: :ventura

            app "DefaultBrowserRouter.app"

            caveats <<~CAVEATS
              This build is ad-hoc signed (not notarized). Clear the download quarantine,
              then launch it once (by path, since it isn't registered yet):
                xattr -dr com.apple.quarantine "#{appdir}/DefaultBrowserRouter.app"
                open "#{appdir}/DefaultBrowserRouter.app"

              Default Browser Router runs from the menu bar (a link icon) — no window.
              On first launch, confirm the "make this your default browser?" prompt, or set
              it in System Settings -> Desktop & Dock -> Default web browser.
              Edit rules at ~/.config/default-browser-router/config.yaml
            CAVEATS
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/default-browser-router.rb
          git commit -m "default-browser-router ${VERSION}"
          git push
